<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Продукт</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<header class="header">
		<div class="header__container">
			<nav class="header__menu menu">
				<ul class="menu__list">
					<li class="menu__item"><a href="index.html" class="menu__link">Главная</a></li>
					<li class="menu__item"><a href="catalog.html" class="menu__link">Каталог</a></li>
					<li class="menu__item"><a href="cart.html" class="menu__link">Корзина</a></li>
				</ul>
			</nav>
		</div>
	</header>
	<hr />


	<main class="product page">
		<div class="product__container">
			<h1 class="product__title title"></h1>
			<div class="product__gallery">
				<a href="" target="_blank" class="product__img-link">
					<img src="" alt="" class="product__img"></a>
			</div>

			<div class="product__info">
				<span class="product__price"></span>
				<button class="product__buy button">Купить</button>
			</div>
			<section class="product__section section-product">
				<h2 class="section-product__title">Краткое описание</h2>
				<div class="product__short-description">
					<p></p>
				</div>
			</section>
			<section class="product__section section-product">
				<h2 class="section-product__title">Подробное описание</h2>
				<div class="product__description">
					<p></p>
				</div>
			</section>

			<section class="product__section section-product">
				<h2 class="section-product__title">Характеристики</h2>
				<ul class="product__specs-list specs-list">
					<li class="specs-list__item">
						<span class="specs-list__label"></span>
						<span class="specs-list__value"></span>
					</li>
				</ul>
			</section>
		</div>
	</main>
	<hr />


	<footer class="footer">
		<div class="footer__container">
			<div class="footer__copy copy-footer">
				<img src="img/copyright.png" alt="копирайт" class="copy-footer__img" width="20px">
				<p class="copy-footer__text">Все права защищены</p>
			</div>
		</div>
	</footer>
	<script src="script.js"></script>
</body>

</html>
