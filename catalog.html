<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Каталог запчастей</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<header class="header">
		<div class="header__container">
			<nav class="header__menu menu">
				<ul class="menu__list">
					<li class="menu__item"><a href="index.html" class="menu__link">Главная</a></li>
					<li class="menu__item"><a href="catalog.html" class="menu__link">Каталог</a></li>
					<li class="menu__item"><a href="cart.html" class="menu__link">Корзина</a></li>
				</ul>
			</nav>
		</div>
	</header>
	<hr />
	<div class="catalog page">
		<div class="catalog__filter-open filter-open">
			<img src="img/filter.png" alt="Фильтр" class="filter-open__img">
		</div>
		<div class="catalog__container">
			<side class="catalog__filters filters">
				<div class="filters__content">
					<div class="filters__head">
						<h2 class="filters__title">Фильтры</h2>
						<span class="filters__close">х</span>
					</div>
					<div class="filters__item item-filters">
						<p class="item-filters__title"></p>
						<div class="item-filters__checkboxes">
							<label class="checkbox item-filters__checkbox">
								<input type="checkbox" class="checkbox__input" name="" value="">
								<span class="checkbox__label"></span>
							</label>
						</div>
					</div>
				</div>

			</side>
			<main class="catalog__products">
				<h1 class="catalog__title title">Каталог</h1>
				<div class="catalog__grid">
					<article class="catalog__product product-catalog template">
						<div class="product-catalog__top">
							<img src="" alt="" class="product-catalog__img">
						</div>
						<div class="product-catalog__bottom">
							<span class="product-catalog__price"></span>
							<h3 class="product-catalog__title">
								<a href="product.html" class="product-catalog__link"></a>
							</h3>
						</div>
					</article>
				</div>
			</main>
		</div>
	</div>

	<hr />
	<footer class="footer">
		<div class="footer__container">
			<div class="footer__copy copy-footer">
				<img src="img/copyright.png" alt="копирайт" class="copy-footer__img" width="20px">
				<p class="copy-footer__text">Все права защищены</p>
			</div>
		</div>
	</footer>
	<script src="script.js"></script>
</body>

</html>
