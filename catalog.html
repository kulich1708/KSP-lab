<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Каталог запчастей</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<header class="header">
		<div class="header__container">
			<nav class="header__menu menu">
				<ul class="menu__list">
					<li class="menu__item"><a href="index.html" class="menu__link">Главная</a></li>
					<li class="menu__item"><a href="catalog.html" class="menu__link">Каталог</a></li>
				</ul>
			</nav>
		</div>
	</header>
	<hr />
	<main class="catalog">
		<div class="catalog__container">
			<h1 class="catalog__title title">Каталог</h1>
			<div class="catalog__grid">
				<article class="catalog__product product-catalog">
					<div class="product-catalog__top">
						<img src="img/catalog/block.png" alt="Блок цилиндров" class="product-catalog__img">
					</div>
					<div class="product-catalog__bottom">
						<span class="product-catalog__price">20 000Р</span>
						<h3 class="product-catalog__title">
							<a href="product.html" class="product-catalog__link">Блок цилиндров</a>
						</h3>
					</div>
				</article>
				<article class="catalog__product product-catalog">
					<div class="product-catalog__top">
						<img src="img/catalog/head.jpg" alt="Головка блока цилиндров" class="product-catalog__img">
					</div>
					<div class="product-catalog__bottom">
						<span class="product-catalog__price">15 000Р</span>
						<h3 class="product-catalog__title">
							<a href="product.html" class="product-catalog__link">Головка блока цилиндров</a>
						</h3>
					</div>
				</article>
				<article class="catalog__product product-catalog">
					<div class="product-catalog__top">
						<img src="img/catalog/kolenval.jpg" alt="Коленвал для двигателя" class="product-catalog__img">
					</div>
					<div class="product-catalog__bottom">
						<span class="product-catalog__price">10 000Р</span>
						<h3 class="product-catalog__title">
							<a href="product.html" class="product-catalog__link">Коленвал для двигателя</a>
						</h3>
					</div>
				</article>
				<article class="catalog__product product-catalog">
					<div class="product-catalog__top">
						<img src="img/catalog/porshen.jpg" alt="Поршень с шатуном в сборе" class="product-catalog__img">
					</div>
					<div class="product-catalog__bottom">
						<span class="product-catalog__price">8 000Р</span>
						<h3 class="product-catalog__title">
							<a href="product.html" class="product-catalog__link">Поршень с шатуном в сборе</a>
						</h3>
					</div>
				</article>
				<article class="catalog__product product-catalog">
					<div class="product-catalog__top">
						<img src="img/catalog/raspredval.jpg" alt="Распредвал для двигателя"
							class="product-catalog__img">
					</div>
					<div class="product-catalog__bottom">
						<span class="product-catalog__price">7 000Р</span>
						<h3 class="product-catalog__title">
							<a href="product.html" class="product-catalog__link">Распредвал для двигателя</a>
						</h3>
					</div>
				</article>
				<article class="catalog__product product-catalog">
					<div class="product-catalog__top">
						<img src="img/catalog/wheel.png" alt="Колесо" class="product-catalog__img">
					</div>
					<div class="product-catalog__bottom">
						<span class="product-catalog__price">10 000Р</span>
						<h3 class="product-catalog__title">
							<a href="product.html" class="product-catalog__link">Колесо</a>
						</h3>
					</div>
				</article>
			</div>
		</div>
	</main>
	<hr />
	<footer class="footer">
		<div class="footer__container">
			<div class="footer__copy copy-footer">
				<img src="img/copyright.png" alt="копирайт" class="copy-footer__img" width="20px">
				<p class="copy-footer__text">Все права защищены</p>
			</div>
		</div>
	</footer>
</body>

</html>
