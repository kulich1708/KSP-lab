<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Корзина</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<header class="header">
		<div class="header__container">
			<nav class="header__menu menu">
				<ul class="menu__list">
					<li class="menu__item"><a href="index.html" class="menu__link">Главная</a></li>
					<li class="menu__item"><a href="catalog.html" class="menu__link">Каталог</a></li>
					<li class="menu__item"><a href="cart.html" class="menu__link">Корзина</a></li>
				</ul>
			</nav>
		</div>
	</header>
	<hr />
	<main class="cart page">
		<div class="cart__container">
			<h1 class="cart__title title">Корзина</h1>

			<article class="catalog__product product-catalog cart__item template">
				<div class="product-catalog__top">
					<img src="" alt="" class="product-catalog__img">
				</div>
				<div class="product-catalog__bottom">
					<span class="product-catalog__price"></span>
					<h3 class="product-catalog__title">
						<a href="product.html" class="product-catalog__link"></a>
					</h3>

					<div class="cart__quantity-controls">
						<div class="cart__quantity">
							<button class="cart__quantity-btn cart__quantity-btn--minus">-</button>
							<span class="cart__quantity-value">1</span>
							<button class="cart__quantity-btn cart__quantity-btn--plus">+</button>
						</div>
						<button class="cart__remove-btn">Удалить</button>
					</div>

					<div class="cart__item-total"></div>
				</div>
			</article>

			<div class="catalog__grid"></div>

			<template class="cart__summary-template">
				<div class="cart__summary">
					<div class="cart__summary-content">
						<div class="cart__total-info">
							<span class="cart__total-items">Всего товаров: 0</span>
							<span class="cart__total-price">Общая сумма: 0 ₽</span>
						</div>
						<div class="cart__summary-actions">
							<button class="cart__checkout-btn button">Оплатить</button>
							<button class="cart__clear-btn button">Очистить корзину</button>
						</div>
					</div>
				</div>
			</template>
		</div>
	</main>

	<hr />
	<footer class="footer">
		<div class="footer__container">
			<div class="footer__copy copy-footer">
				<img src="img/copyright.png" alt="копирайт" class="copy-footer__img" width="20px">
				<p class="copy-footer__text">Все права защищены</p>
			</div>
		</div>
	</footer>
	<script src="script.js"></script>
</body>

</html>
